# License validation rules for ZEISS measurement systems
#
# Each rule checks that a required license product is present.
# Matching is done against both the "Product Name" column and the
# "License Name" column in licenses.csv.
#
# product_patterns: list of substrings to match (case-insensitive) against
#   Product Name OR License Name fields in the CSV.

licenses:
  aramis_24m_sensor:
    product_patterns:
      - "Sensor Driver ARAMIS 24M"
      - "aramis-24m"
    required_for:
      - "ARAMIS 24M"
    severity: WARNING
    description: >
      ARAMIS 24M sensor driver license is required for ARAMIS 24M systems.
    recommendation: >
      Verify the license file includes the Sensor Driver ARAMIS 24M entitlement
      (License Name: Z_INSPECT_aramis-24m). Check dongle serial matches the license.

  aramis_sensor:
    product_patterns:
      - "Sensor Driver ARAMIS"
      - "Z_INSPECT_aramis"
    required_for:
      - "ARAMIS 24M"
      - "ARAMIS 12M"
      - "ARAMIS 4M"
      - "ARAMIS SRX"
    severity: WARNING
    description: >
      Base ARAMIS sensor driver license is required for all ARAMIS systems.
    recommendation: >
      Verify the license file includes the Sensor Driver ARAMIS entitlement.

  correlate_license:
    product_patterns:
      - "ZEISS CORRELATE"
      - "Z_INSPECT_correlate"
    required_for:
      - "ARAMIS 24M"
      - "ARAMIS 12M"
      - "ARAMIS 4M"
      - "ARAMIS SRX"
    severity: WARNING
    description: >
      ZEISS CORRELATE license is required for DIC/ARAMIS systems.
    recommendation: >
      Verify the license file includes a ZEISS CORRELATE entitlement.

  atos_q_sensor:
    product_patterns:
      - "ATOS Q"
      - "atos-q"
    required_for:
      - "ATOS Q"
      - "ATOS Q AWK"
    severity: WARNING
    description: >
      ATOS Q sensor license is required.
    recommendation: >
      Verify the license file includes the ATOS Q sensor entitlement.
