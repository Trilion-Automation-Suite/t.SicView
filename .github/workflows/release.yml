name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build

      - name: Build Python wheel
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/*.whl

  build-electron-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install -e ".[server,standalone]"

      - name: Bundle Python server (PyInstaller)
        working-directory: standalone
        run: npm run build-server

      - name: Install Node dependencies
        working-directory: standalone
        run: npm ci

      - name: Build Electron installer
        working-directory: standalone
        run: npm run make

      - uses: actions/upload-artifact@v4
        with:
          name: electron-windows
          path: |
            standalone/out/make/**/*.exe
            standalone/out/make/**/*.zip

  build-electron-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install -e ".[server,standalone]"

      - name: Bundle Python server (PyInstaller)
        working-directory: standalone
        run: npm run build-server

      - name: Install Node dependencies
        working-directory: standalone
        run: npm ci

      - name: Build Electron app
        working-directory: standalone
        run: npm run make

      - uses: actions/upload-artifact@v4
        with:
          name: electron-macos
          path: standalone/out/make/**/*.zip

  publish:
    needs: [build-wheel, build-electron-windows, build-electron-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.whl
            artifacts/**/*.exe
            artifacts/**/*.zip
